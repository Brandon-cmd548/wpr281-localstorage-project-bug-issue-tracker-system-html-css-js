<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Crusher 3000</title>
    <link rel="stylesheet" href="login-page-style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class = leftSide>
            <div id="themeChangeWrap">
    <button id="themeChange" onclick="themeChange()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1"  x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1"  y1="12" x2="3"  y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
            <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
        </svg>
        <span id="themeLabel">Dark Mode</span>
    </button>
</div>
        </aside>
        <main class = middle>  
            <div id="loginLogo">
            </div>
            <div class="login">
                <form action="" id="loginForm">
                <section>          
                    <input type="text" id="uname" name="uname" placeholder="Username">
                </section>                    
                <section>          
                    <input type="password" id="password" name="password" placeholder="Password">
                </section> 
                <p id="loginFailMessage">Login failed. Please try again.</p>    
                <section>
                    <button type="submit" id="button">Login</button>
                </section>
                </form> 
            </div>
        </main>
        <aside class="rightSide">
        </aside>
    </div>
    <script src="../initiating-Localstorage-Objects-and-Sample-Data/sampleData.js"></script>
    <script src="app.js"></script>
    <script src="login-handler.js"></script>
</body>
</html>
